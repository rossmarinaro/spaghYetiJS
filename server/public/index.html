<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">

    <title>&#127837; &#128076; spagYETIJS IDE &#127837; &#128076;</title>

    <link rel="stylesheet" type="text/css" href="/style.css"/>
  <!--   <script type="text/javascript" src="https://connect.facebook.net/en_US/fbinstant.6.2.js"></script> -->

    </head>

  <body>
    
    <div class="container" id="main-container">

      <div class="container" id="game"></div>
      <div class="container" id="workspace">

          <div class="container" >
            <form >
              <input class="form-input" id="build-project" type="submit" value="Build" name="buildButton"/>
              <input class="form-input" type="submit" value="Open" name="openButton"/>
              <input class="form-input" type="submit" value="Save" name="saveButton"/>
            </form>
            <br>
            <form >
                <input id="game-width-bar" class="form-input" type="text" placeholder="width" name="username" minLength="2" maxLength="10" />
                <input id="game-height-bar" class="form-input" type="text" placeholder="height" name="username" minLength="2" maxLength="10" />
                <input class="form-input" id="form-submit" type="submit" value="Apply" name="submitButton"/>
                <input class="form-input" id="reset-canvas" type="submit" value="Reset" name="resetButton"/>
            </form>
          </div>
 
        <div class="container">
          <h1>Assets</h1>
          <form id="assets">
            <input id="load-asset-bar" class="form-input" type="file"  name="load-asset" /> <!-- multiple -->
           <!--  <input id="load-asset" class="form-input" type="submit" value="Load" name="assetButton"/> -->
            <div id="output"></div>
          </form>
        </div>

      </div>

    </div>
    
   <script>



   </script>
    
  <script type="text/javascript" src="bundle.min.js"></script><script type="text/javascript" src="bundle.min.js"></script></body>

</html>
